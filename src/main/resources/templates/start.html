<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Chess Game - Start</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        h1 {
            color: #2c3e50;
            font-size: 2.5em;
            margin-bottom: 0.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .start-form {
            background-color: white;
            padding: 40px;
            border-radius: 20px;
            margin: 40px auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 600px;
            position: relative;
            overflow: visible;
            box-sizing: border-box;
        }

        .start-form::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #4CAF50, #45a049);
        }
        .mode-selector {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap; /* allow options to wrap on small screens */
        }

        .mode-option {
            position: relative;
            flex: 1 1 200px; /* flexible tiles with minimum width */
            max-width: 260px;
            min-width: 160px;
        }

        .mode-option input[type="radio"] {
            display: none;
        }

        .mode-option label {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .mode-option label:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .mode-option input[type="radio"]:checked + label {
            background: #4CAF50;
            color: white;
            border-color: #45a049;
            box-shadow: 0 5px 15px rgba(76,175,80,0.3);
        }

        .mode-icon {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .mode-title {
            font-weight: 500;
            margin-bottom: 5px;
        }

        .mode-description {
            font-size: 0.85em;
            opacity: 0.8;
        }

        .form-group {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .form-group:hover {
            background: #fff;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .input-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 16px;
            gap: 6px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            font-size: 16px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            transition: all 0.3s ease;
            background: white;
            color: #2c3e50;
            box-sizing: border-box;
        }

        input[type="text"]:focus {
            border-color: #4CAF50;
            outline: none;
            box-shadow: 0 0 0 3px rgba(76,175,80,0.2);
        }

        /* Labels placed above inputs to avoid overlap and improve accessibility */
        label {
            position: relative;
            left: auto;
            top: auto;
            background: transparent;
            padding: 0;
            color: #2c3e50;
            font-size: 14px;
            font-weight: 600;
            text-align: left;
            margin-left: 4px;
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
        }

        .button {
            padding: 12px 30px;
            font-size: 16px;
            font-weight: 500;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 150px;
        }

        .button-primary {
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(76,175,80,0.3);
        }

        .button-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(76,175,80,0.4);
        }

        .button-secondary {
            background: linear-gradient(135deg, #6c757d 0%, #495057 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(108,117,125,0.3);
        }

        .button-secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(108,117,125,0.4);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            animation: fadeIn 0.5s ease forwards;
        }

        :root {
            --page-bg: #eef2ef;
            --surface: #fffdf8;
            --surface-soft: #f4f0e8;
            --line: #ded7ca;
            --text: #1f2923;
            --muted: #6f756f;
            --accent: #2f7d52;
            --accent-strong: #225c3c;
            --shadow-soft: 0 18px 48px rgba(36,43,37,0.14);
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        html {
            background: var(--page-bg);
        }

        body {
            max-width: 980px;
            padding: 32px 20px;
            background:
                linear-gradient(180deg, rgba(255,255,255,0.72), rgba(255,255,255,0) 320px),
                radial-gradient(circle at top left, rgba(47,125,82,0.12), transparent 340px),
                var(--page-bg);
            color: var(--text);
            text-align: left;
        }

        h1 {
            width: 100%;
            margin: 8px 0 8px;
            color: var(--text);
            font-size: 42px;
            line-height: 1.05;
            font-weight: 700;
            letter-spacing: 0;
            text-shadow: none;
        }

        .start-form {
            width: 100%;
            max-width: 760px;
            margin: 24px auto 0;
            padding: 28px;
            background: rgba(255,253,248,0.96);
            border: 1px solid var(--line);
            border-radius: 8px;
            box-shadow: var(--shadow-soft);
        }

        .start-form::before {
            height: 5px;
            background: linear-gradient(90deg, var(--accent), #b08c45);
        }

        .start-form h2,
        .start-form h3 {
            color: var(--text) !important;
            letter-spacing: 0;
        }

        .mode-selector {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
            margin-bottom: 22px;
        }

        .mode-option {
            max-width: none;
            min-width: 0;
        }

        .mode-option label {
            min-height: 124px;
            padding: 18px;
            align-items: flex-start;
            background: var(--surface);
            border-color: var(--line);
            border-radius: 8px;
            color: var(--text);
        }

        .mode-option label:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 26px rgba(36,43,37,0.1);
        }

        .mode-option input[type="radio"]:checked + label {
            background: #eef6f1;
            color: var(--text);
            border-color: rgba(47,125,82,0.58);
            box-shadow: 0 0 0 3px rgba(47,125,82,0.12);
        }

        .mode-icon {
            color: var(--accent);
            font-size: 22px;
        }

        .mode-title {
            font-weight: 700;
        }

        .mode-description {
            color: var(--muted);
            line-height: 1.4;
        }

        .form-group {
            padding: 0;
            margin-bottom: 20px;
            background: transparent;
            border-radius: 0;
        }

        .form-group:hover {
            background: transparent;
            box-shadow: none;
        }

        .input-group {
            margin-bottom: 14px;
        }

        label {
            color: var(--muted);
            font-size: 13px;
            letter-spacing: 0;
        }

        input[type="text"] {
            min-height: 44px;
            border: 1px solid var(--line) !important;
            border-radius: 8px !important;
            background: white;
            color: var(--text);
        }

        input[type="text"]:focus {
            border-color: rgba(47,125,82,0.72) !important;
            box-shadow: 0 0 0 3px rgba(47,125,82,0.14);
        }

        .button {
            min-height: 44px;
            border-radius: 8px;
            font-weight: 700;
            box-shadow: 0 8px 18px rgba(40,53,45,0.15);
        }

        .button-primary {
            background: var(--accent);
            box-shadow: 0 10px 22px rgba(47,125,82,0.24);
        }

        .button-primary:hover {
            background: var(--accent-strong);
            box-shadow: 0 12px 24px rgba(47,125,82,0.24);
        }

        .button-secondary {
            background: #28352d;
            box-shadow: 0 8px 18px rgba(40,53,45,0.16);
        }

        .button-secondary:hover {
            background: #34463b;
            box-shadow: 0 10px 22px rgba(40,53,45,0.18);
        }

        #createRoomForm,
        #joinRoomForm {
            width: 100%;
        }

        @media (max-width: 720px) {
            body {
                padding: 22px 14px;
            }

            h1 {
                font-size: 34px;
            }

            .start-form {
                padding: 22px;
            }

            .mode-selector {
                grid-template-columns: 1fr;
            }

            #createRoomForm,
            #joinRoomForm {
                flex-direction: column;
                align-items: stretch !important;
            }

            .button,
            .button-group,
            #createRoomForm button,
            #joinRoomForm button {
                width: 100%;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <h1>♟️ Welcome to Chess Game</h1>
    <div class="start-form fade-in">
        <h2 style="color: #2c3e50; margin-bottom: 30px;">Choose Your Game Mode</h2>
        
        <div th:if="${error != null}" style="margin-bottom:12px;">
            <div style="background:#ffdddd;color:#8b0000;padding:10px;border-radius:8px;border:1px solid #f5c2c2;">
                <strong>Error:</strong> <span th:text="${error}"></span>
            </div>
        </div>

        <div class="mode-selector">
            <div class="mode-option">
                <input type="radio" id="aiMode" name="gameMode" value="ai" checked>
                <label for="aiMode" onclick="toggleGameMode('ai')">
                    <i class="fas fa-robot mode-icon"></i>
                    <span class="mode-title">Play vs AI</span>
                    <span class="mode-description">Challenge our AI opponent</span>
                </label>
            </div>
            
            <div class="mode-option">
                <input type="radio" id="humanMode" name="gameMode" value="human">
                <label for="humanMode" onclick="toggleGameMode('human')">
                    <i class="fas fa-user-friends mode-icon"></i>
                    <span class="mode-title">Play vs Human</span>
                    <span class="mode-description">Challenge a friend</span>
                </label>
            </div>
        </div>

        <form id="gameForm" action="/start" method="post">
            <div class="form-group">
                <div class="input-group">
                    <input type="text" id="whitePlayerName" name="whitePlayerName" required>
                    <label for="whitePlayerName">White Player Name</label>
                </div>
                
                <div class="input-group" id="blackPlayerDiv" style="display: none;">
                    <input type="text" id="blackPlayerName" name="blackPlayerName" required>
                    <label for="blackPlayerName">Black Player Name</label>
                </div>
            </div>

            <input type="hidden" id="blackAi" name="blackAi" value="true">
            <input type="hidden" id="whiteAi" name="whiteAi" value="false">

            <div class="button-group">
                <button type="submit" class="button button-primary">
                    <i class="fas fa-chess-knight"></i>&nbsp; Start Game
                </button>
            </div>
        </form>

        <div style="margin-top: 24px; text-align:left;">
            <h3 style="margin-top:0;">Play Online (Multiplayer)</h3>
            <div style="display:flex; gap:12px; flex-wrap:wrap;">
                <form id="createRoomForm" action="/rooms" method="post" style="display:flex; gap:8px; align-items:center;">
                    <input id="createPlayerName" type="text" name="playerName" placeholder="Your name" required th:value="${playerName}" style="padding:8px;border-radius:8px;border:1px solid #ddd;">
                    <button type="submit" class="button button-secondary">Create Room</button>
                </form>

                <form id="joinRoomForm" onsubmit="joinRoom(event)" style="display:flex; gap:8px; align-items:center;">
                    <input type="text" id="joinRoomId" placeholder="Room ID" required style="padding:8px;border-radius:8px;border:1px solid #ddd;">
                    <input type="text" id="joinName" placeholder="Your name" required style="padding:8px;border-radius:8px;border:1px solid #ddd;">
                    <button type="submit" class="button button-secondary">Join Room</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // Set initial state
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('blackPlayerName').value = 'Chess AI';
            document.getElementById('blackPlayerDiv').style.display = 'none';
            document.getElementById('whitePlayerName').focus();
        });

        function showToast(message, type = 'error') {
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                padding: 15px 25px;
                background: ${type === 'error' ? '#ff4444' : '#4CAF50'};
                color: white;
                border-radius: 8px;
                box-shadow: 0 4px 15px rgba(0,0,0,0.2);
                font-size: 14px;
                z-index: 1000;
                transition: all 0.3s ease;
                transform: translateY(-100%);
                opacity: 0;
            `;
            toast.textContent = message;
            document.body.appendChild(toast);

            // Animate in
            setTimeout(() => {
                toast.style.transform = 'translateY(0)';
                toast.style.opacity = '1';
            }, 100);

            // Remove after 3 seconds
            setTimeout(() => {
                toast.style.transform = 'translateY(-100%)';
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function toggleGameMode(mode) {
            const blackPlayerDiv = document.getElementById('blackPlayerDiv');
            const blackPlayerInput = document.getElementById('blackPlayerName');
            const blackAi = document.getElementById('blackAi');
            const aiMode = document.getElementById('aiMode');
            const humanMode = document.getElementById('humanMode');
            
            // Update radio buttons
            if (mode === 'ai') {
                aiMode.checked = true;
                blackPlayerDiv.style.display = 'none';
                blackPlayerInput.value = 'Chess AI';
                blackAi.value = 'true';
                
                // Animate the transition
                blackPlayerDiv.style.opacity = '0';
                blackPlayerDiv.style.transform = 'translateY(10px)';
            } else {
                humanMode.checked = true;
                blackPlayerDiv.style.display = 'block';
                blackPlayerInput.value = '';
                blackAi.value = 'false';
                
                // Animate the transition
                setTimeout(() => {
                    blackPlayerDiv.style.opacity = '1';
                    blackPlayerDiv.style.transform = 'translateY(0)';
                }, 50);
            }

            // Clear white player name and set focus
            document.getElementById('whitePlayerName').focus();
        }

        // Enhanced form validation with visual feedback
        document.getElementById('gameForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const whitePlayer = document.getElementById('whitePlayerName').value.trim();
            const blackPlayer = document.getElementById('blackPlayerName').value.trim();
            const isAiMode = document.getElementById('aiMode').checked;

            if (!whitePlayer) {
                showToast('Please enter white player\'s name');
                document.getElementById('whitePlayerName').focus();
                return;
            }

            if (!isAiMode) {
                if (!blackPlayer) {
                    showToast('Please enter black player\'s name');
                    document.getElementById('blackPlayerName').focus();
                    return;
                }
                
                if (whitePlayer === blackPlayer) {
                    showToast('Players must have different names');
                    document.getElementById('blackPlayerName').focus();
                    return;
                }
            }

            // Visual feedback before submission
            const submitButton = this.querySelector('button[type="submit"]');
            submitButton.innerHTML = '<i class="fas fa-spinner fa-spin"></i>&nbsp; Starting...';
            submitButton.disabled = true;

            // Submit the form after a short delay for visual feedback
            setTimeout(() => this.submit(), 500);
        });

        function joinRoom(e) {
            e.preventDefault();
            const roomId = document.getElementById('joinRoomId').value.trim();
            const name = document.getElementById('joinName').value.trim();
            if (!roomId || !name) return;
            window.location.href = '/room/' + encodeURIComponent(roomId) + '?name=' + encodeURIComponent(name);
        }
    </script>
</body>
</html>
