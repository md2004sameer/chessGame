<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Chess Game</title>
    <script src="/js/stomp.umd.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        /* ===== RESET ===== */
        *, *::before, *::after { box-sizing: border-box; }

        /* ===== DESIGN TOKENS ===== */
        :root {
            --board-size: 608px;
            --cell-size: calc(var(--board-size) / 8);
            --sidebar-w: 192px;
            --gap: 20px;

            /* Surfaces */
            --bg:         #f0ede6;
            --surface:    #faf8f3;
            --surface-2:  #f2ede3;
            --surface-dk: #24302a;

            /* Lines */
            --line:       #ddd6c8;
            --line-2:     #c8bfae;

            /* Text */
            --text:       #1c2420;
            --muted:      #7a7669;

            /* Accent */
            --green:      #2e7d52;
            --green-2:    #1e5c3a;
            --gold:       #b8922a;
            --danger:     #b5403a;
            --danger-2:   #8f312c;

            /* Board */
            --sq-light:   #f0d9b5;
            --sq-dark:    #b58863;

            /* Shadows */
            --sh-soft:    0 8px 28px rgba(28,36,32,.10);
            --sh-board:   0 24px 56px rgba(30,22,12,.30), 0 0 0 1px rgba(40,28,16,.50);

            /* Animation */
            --dur-move:   260ms;
            --dur-ui:     180ms;
            --ease-spring: cubic-bezier(.34,1.56,.64,1);
            --ease-smooth: cubic-bezier(.4,0,.2,1);
            --ease-out:    cubic-bezier(.0,0,.2,1);
        }

        html { background: var(--bg); }

        body {
            font-family: 'DM Sans', system-ui, sans-serif;
            max-width: 1280px;
            margin: 0 auto;
            padding: 28px 24px 60px;
            background:
                radial-gradient(ellipse 900px 400px at 50% -80px, rgba(46,125,82,.10), transparent),
                var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ===== PAGE HEADER ===== */
        .page-header {
            text-align: center;
            margin-bottom: 28px;
        }

        .page-header h1 {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 36px;
            font-weight: 800;
            margin: 0 0 4px;
            color: var(--text);
            letter-spacing: -0.5px;
        }

        .page-header p {
            margin: 0;
            color: var(--muted);
            font-size: 14px;
        }

        /* ===== GAME INFO PANEL ===== */
        .game-info {
            margin: 0 auto 20px;
            padding: 16px 20px;
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 12px;
            box-shadow: var(--sh-soft);
            display: grid;
            grid-template-columns: 1fr auto;
            grid-template-rows: auto auto;
            grid-template-areas:
                "turn    players"
                "status  room";
            gap: 10px 16px;
            align-items: center;
        }

        .game-info h2 {
            grid-area: turn;
            margin: 0;
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 20px;
            font-weight: 600;
            color: var(--text);
        }

        #statusText {
            grid-area: status;
            margin: 0;
            padding: 6px 14px;
            border-radius: 999px;
            border: 1px solid rgba(46,125,82,.22);
            background: rgba(46,125,82,.09);
            color: var(--green-2);
            font-size: 13px;
            font-weight: 700;
            width: fit-content;
            transition: color var(--dur-ui) ease, background var(--dur-ui) ease;
        }

        #statusText.alert {
            border-color: rgba(181,64,58,.3);
            background: rgba(181,64,58,.08);
            color: var(--danger);
        }

        .player-info {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .player-info.players-info { grid-area: players; justify-content: flex-end; }
        .player-info.room-info    { grid-area: room;    justify-content: flex-end; }

        .player-tag {
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 7px 12px;
            min-height: 38px;
            font-size: 13px;
            font-weight: 600;
            border-radius: 8px;
            border: 1px solid var(--line);
            background: var(--surface);
            box-shadow: 0 1px 0 rgba(255,255,255,.8) inset;
        }

        .player-tag::before {
            content: "";
            width: 9px; height: 9px;
            border-radius: 50%;
            background: #f2e6c8;
            border: 1.5px solid #a89070;
            flex: 0 0 auto;
        }

        .player-tag.black-tag::before {
            background: #1e1a16;
            border-color: #1e1a16;
        }

        .player-tag.active-tag {
            border-color: var(--green);
            box-shadow: 0 0 0 2px rgba(46,125,82,.15), 0 1px 0 rgba(255,255,255,.8) inset;
        }

        .ai-badge {
            border-radius: 5px;
            background: var(--surface-dk);
            color: #faf8f3;
            padding: 2px 7px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: .06em;
        }

        .player-role {
            min-height: 38px;
            display: inline-flex;
            align-items: center;
            padding: 7px 13px;
            font-size: 13px;
            font-weight: 600;
            border-radius: 8px;
            border: 1px solid var(--line);
            background: var(--surface);
            box-shadow: 0 1px 0 rgba(255,255,255,.8) inset;
        }

        /* ===== BOARD LAYOUT ===== */
        .board-container {
            display: flex;
            gap: var(--gap);
            justify-content: center;
            align-items: flex-start;
            flex-wrap: wrap;
            margin: 24px auto;
        }

        /* coord wrapper: holds board + labels */
        .board-coord-wrapper {
            position: relative;
            width: var(--board-size);
            flex: 0 0 var(--board-size);
        }

        .coord-files,
        .coord-ranks {
            position: absolute;
            pointer-events: none;
            z-index: 5;
        }

        .coord-files {
            bottom: -22px; left: 0; right: 0;
            display: flex; justify-content: space-around;
        }

        .coord-ranks {
            right: -22px; top: 0; bottom: 0;
            display: flex; flex-direction: column; justify-content: space-around;
        }

        .coord-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--muted);
            width: 16px; height: 16px;
            display: flex; align-items: center; justify-content: center;
            opacity: .75;
            user-select: none;
        }

        /* ===== CHESS BOARD ===== */
        .board {
            width: var(--board-size);
            height: var(--board-size);
            display: grid;
            grid-template-rows: repeat(8,1fr);
            grid-template-columns: repeat(8,1fr);
            border: 10px solid #5c3d1e;
            border-radius: 6px;
            box-shadow: var(--sh-board);
            overflow: hidden;
            position: relative;
            transition: transform .55s var(--ease-smooth);
        }

        .board.flipped { transform: rotate(180deg); }
        .board.flipped .cell { transform: rotate(180deg); }

        .row { display: contents; }

        .cell {
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            font-size: calc(var(--board-size) / 11.2);
            cursor: pointer;
            position: relative;
            padding: 4px;
            transition: background-color .1s ease;
            outline: none;
            user-select: none;
        }

        .cell span {
            display: block;
            line-height: 1;
            transition: transform .12s var(--ease-spring);
            pointer-events: none;
        }

        .cell:hover span { transform: scale(1.05); }

        .cell.white { background-color: var(--sq-light); }
        .cell.black { background-color: var(--sq-dark); }

        .cell:hover {
            background-color: rgba(46,125,82,.26) !important;
            box-shadow: inset 0 0 0 3px rgba(30,92,58,.22);
        }

        .cell:focus-visible {
            outline: 3px solid rgba(46,125,82,.65);
            outline-offset: -3px;
            z-index: 6;
        }

        .cell.selected {
            background-color: #d4a843 !important;
            box-shadow: inset 0 0 0 4px rgba(90,60,10,.28);
        }

        /* Last-move highlight */
        .cell.lm-from::before,
        .cell.lm-to::before {
            content: '';
            position: absolute; inset: 0;
            background: rgba(172,206,40,.32);
            animation: fadeIn .3s ease forwards;
            pointer-events: none;
            z-index: 0;
        }

        /* Valid move dot */
        .cell.valid-move::after {
            content: '';
            position: absolute;
            width: min(22px, calc(var(--cell-size) / 3.6));
            height: min(22px, calc(var(--cell-size) / 3.6));
            background: rgba(30,100,60,.55);
            border-radius: 50%;
            box-shadow: 0 0 0 4px rgba(255,255,255,.18);
            animation: dotIn .2s var(--ease-spring) forwards;
            pointer-events: none;
            z-index: 2;
        }

        /* Valid capture ring */
        .cell.valid-capture::after {
            content: '';
            position: absolute;
            inset: 3px;
            background: transparent;
            border: 4px solid rgba(30,100,60,.55);
            border-radius: 2px;
            animation: dotIn .2s var(--ease-spring) forwards;
            pointer-events: none;
            z-index: 2;
        }

        /* In-check pulse */
        .cell.in-check {
            animation: checkPulse 1.1s ease-in-out infinite !important;
            z-index: 3;
        }

        /* ===== CAPTURED PIECES ===== */
        .captured-section {
            display: flex; flex-direction: column;
            min-height: 120px;
            min-width: 110px; max-width: var(--sidebar-w);
            width: 100%;
            padding: 14px;
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 12px;
            box-shadow: var(--sh-soft);
        }

        .captured-section h4 {
            margin: 0 0 10px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--line);
            color: var(--muted);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: .08em;
            font-weight: 700;
        }

        .captured-section > div {
            min-height: 38px;
            display: flex; flex-wrap: wrap;
            align-content: flex-start; gap: 4px;
        }

        .captured-section span {
            width: 28px; height: 28px;
            display: inline-flex; align-items: center; justify-content: center;
            border-radius: 5px;
            background: var(--surface-2);
            font-size: 17px; line-height: 1;
            animation: capturedIn .3s var(--ease-spring) forwards;
        }

        /* ===== MOVE HISTORY ===== */
        .move-history-panel {
            margin: 0 auto 20px;
            padding: 14px 16px;
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 12px;
            box-shadow: var(--sh-soft);
            display: flex; flex-direction: column;
            max-height: 210px;
            overflow: hidden;
        }

        .move-history-panel h4 {
            margin: 0 0 10px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--line);
            color: var(--muted);
            font-size: 11px; text-transform: uppercase;
            letter-spacing: .08em; font-weight: 700;
        }

        .move-history-scroll {
            overflow-y: auto; flex: 1;
        }

        .move-history-list {
            display: grid;
            grid-template-columns: 28px 1fr 1fr;
            gap: 1px 6px;
            font-size: 12.5px;
            font-family: 'DM Mono', 'Courier New', monospace;
        }

        .mh-num  { color: var(--muted); text-align: right; padding: 3px 2px; }
        .mh-cell {
            padding: 3px 7px;
            border-radius: 4px;
            animation: mhSlideIn .22s var(--ease-spring) both;
            cursor: default;
        }
        .mh-cell:hover { background: var(--surface-2); }
        .mh-cell.white-mv { color: var(--text); }
        .mh-cell.black-mv { color: var(--muted); }
        .mh-cell.latest   { background: rgba(46,125,82,.10); color: var(--green-2); font-weight: 700; }
        .mh-empty         { grid-column: 2; color: var(--muted); font-style: italic; padding: 3px 7px; }

        /* ===== CONTROLS ===== */
        .move-form {
            margin: 20px auto 0;
        }

        .controls-bar {
            display: flex;
            gap: 8px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            width: fit-content;
            max-width: 100%;
            margin: 0 auto;
            padding: 10px 14px;
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 12px;
            box-shadow: var(--sh-soft);
        }

        button {
            min-height: 38px;
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            background: var(--surface-dk);
            color: #faf8f3;
            font-family: 'DM Sans', system-ui, sans-serif;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            margin: 0;
            transition:
                background var(--dur-ui) ease,
                transform .1s ease,
                box-shadow .1s ease;
            box-shadow:
                0 1px 0 rgba(255,255,255,.14) inset,
                0 4px 12px rgba(28,36,32,.18);
        }

        button:hover  { background: #374840; transform: translateY(-1px); }
        button:active { transform: translateY(0); box-shadow: 0 2px 6px rgba(28,36,32,.18); }

        button:focus-visible {
            outline: 3px solid rgba(46,125,82,.45);
            outline-offset: 2px;
        }

        .btn-resign  { background: var(--danger); }
        .btn-resign:hover { background: var(--danger-2); }

        .btn-muted   { background: #656b65; }
        .btn-muted:hover { background: #505650; }

        .btn-flip    { background: #3d5a80; }
        .btn-flip:hover { background: #2e4560; }

        .btn-undo    { background: #7a6434; }
        .btn-undo:hover { background: #5e4c28; }

        /* ===== ANIMATED PIECE ===== */
        .anim-piece {
            position: absolute;
            display: flex; align-items: center; justify-content: center;
            pointer-events: none;
            z-index: 1000;
            will-change: transform;
            transition: transform var(--dur-move) var(--ease-smooth);
        }

        /* ===== MODALS ===== */
        .modal-backdrop {
            position: fixed; inset: 0;
            display: none; align-items: center; justify-content: center;
            background: rgba(0,0,0,.52);
            z-index: 10001;
        }
        .modal-backdrop.show { display: flex; }

        .modal-card {
            border: 1px solid var(--line);
            border-radius: 14px;
            background: var(--surface);
            color: var(--text);
            box-shadow: 0 32px 80px rgba(20,28,24,.30);
            padding: 28px 32px;
            text-align: center;
            animation: modalIn .32s var(--ease-spring) forwards;
            max-width: 92vw;
        }

        .modal-card h3 {
            margin: 0 0 18px;
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 22px;
        }

        .modal-card p { margin: 0 0 20px; color: var(--muted); font-size: 14px; }

        .modal-actions { display: flex; gap: 10px; justify-content: center; }

        .promotion-pieces { display: flex; gap: 10px; justify-content: center; }

        .promo-btn {
            width: 68px; height: 68px;
            font-size: 40px;
            background: var(--surface-2);
            border: 2px solid var(--line) !important;
            border-radius: 10px !important;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            padding: 0; margin: 0;
            transition: all .15s var(--ease-spring) !important;
            box-shadow: none !important;
            color: inherit;
            animation: promoIn .4s var(--ease-spring) both;
            opacity: 0;
        }
        .promo-btn:nth-child(1) { animation-delay: .04s; }
        .promo-btn:nth-child(2) { animation-delay: .09s; }
        .promo-btn:nth-child(3) { animation-delay: .14s; }
        .promo-btn:nth-child(4) { animation-delay: .19s; }

        .promo-btn:hover {
            background: var(--green) !important;
            border-color: var(--green) !important;
            transform: translateY(-5px) scale(1.1) !important;
            box-shadow: 0 10px 24px rgba(46,125,82,.38) !important;
            color: white;
        }

        /* ===== CELEBRATION ===== */
        .celebration-overlay {
            position: fixed; inset: 0;
            display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,.22);
            z-index: 9999;
            pointer-events: none;
        }

        .celebration-card {
            background: rgba(250,248,243,.97);
            border: 1px solid var(--line);
            border-radius: 16px;
            box-shadow: 0 32px 80px rgba(20,28,24,.30);
            padding: 34px 44px;
            text-align: center;
            pointer-events: auto;
            animation: modalIn .5s var(--ease-spring) forwards;
        }

        .cel-trophy { font-size: 52px; margin-bottom: 10px; animation: trophyBounce .6s var(--ease-spring) .3s both; }
        .cel-title  { font-family: 'Playfair Display', Georgia, serif; font-size: 28px; font-weight: 800; margin: 0 0 6px; }
        .cel-sub    { color: var(--muted); margin: 0 0 20px; font-size: 14px; }

        /* ===== KEYFRAMES ===== */
        @keyframes fadeIn    { from { opacity:0 } to { opacity:1 } }

        @keyframes dotIn {
            0%   { transform: scale(0);    opacity: 0; }
            65%  { transform: scale(1.28); opacity: 1; }
            100% { transform: scale(1);    opacity: 1; }
        }

        @keyframes checkPulse {
            0%,100% {
                background-color: rgba(200,40,36,.22) !important;
                box-shadow: inset 0 0 0 3px rgba(200,40,36,.65);
            }
            50% {
                background-color: rgba(200,40,36,.42) !important;
                box-shadow: inset 0 0 0 5px rgba(200,40,36,.95), 0 0 22px rgba(200,40,36,.5);
            }
        }

        @keyframes mhSlideIn {
            from { transform: translateX(12px); opacity: 0; }
            to   { transform: translateX(0);    opacity: 1; }
        }

        @keyframes capturedIn {
            from { transform: scale(0) rotate(-20deg); opacity: 0; }
            to   { transform: scale(1) rotate(0deg);   opacity: 1; }
        }

        @keyframes modalIn {
            from { transform: scale(.84) translateY(10px); opacity: 0; }
            to   { transform: scale(1)   translateY(0);    opacity: 1; }
        }

        @keyframes promoIn {
            from { transform: translateY(18px) scale(.7); opacity: 0; }
            to   { transform: translateY(0)    scale(1);  opacity: 1; }
        }

        @keyframes trophyBounce {
            from { transform: scale(0) rotate(-30deg); opacity: 0; }
            to   { transform: scale(1) rotate(0deg);   opacity: 1; }
        }

        @keyframes pieceAppear {
            from { transform: scale(.5) rotate(-15deg); opacity: 0; }
            to   { transform: scale(1)  rotate(0deg);   opacity: 1; }
        }

        /* ===== RESPONSIVE ===== */
        @media (min-width: 900px) {
            .board-container { flex-wrap: nowrap; margin: 28px auto; }
            .captured-section { flex: 0 0 var(--sidebar-w); width: var(--sidebar-w); }
            .board-coord-wrapper { flex: 0 0 var(--board-size); }
        }

        @media (max-width: 900px) {
            :root { --board-size: min(520px, calc(100vw - 48px)); }
            .game-info {
                grid-template-columns: 1fr;
                grid-template-areas: "turn" "status" "players" "room";
            }
            .player-info.players-info,
            .player-info.room-info { justify-content: flex-start; }
        }

        @media (max-width: 700px) {
            :root { --board-size: min(420px, calc(100vw - 32px)); }
            body { padding: 16px 14px 48px; }
        }

        @media (max-width: 480px) {
            :root { --board-size: min(340px, calc(100vw - 28px)); }
            .board-container { flex-direction: column; align-items: center; }
            .captured-section { width: 82%; max-width: none; }
            .controls-bar { width: 100%; justify-content: center; }
            .move-form { width: 100%; }
        }

        /* scrollbar style */
        .move-history-scroll::-webkit-scrollbar { width: 4px; }
        .move-history-scroll::-webkit-scrollbar-track { background: transparent; }
        .move-history-scroll::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 2px; }
    </style>
</head>
<body>
    <div class="game-info">
        <h2 id="turnTitle" th:text="'Current Turn: ' + ${currentPlayer.name} + ' (' + (${currentPlayer.white} ? 'White' : 'Black') + ')'">Current Turn</h2>
        <p id="statusText" th:if="${gameStatus.name() == 'ACTIVE'}" th:text="${currentPlayer.name} + '\'s turn to move'">Player's turn</p>
        <p id="statusText" th:if="${gameStatus.name() != 'ACTIVE'}" th:text="'Game Status: ' + ${gameStatus}">Game Status</p>
        <div th:if="${roomId != null}" class="player-info" style="margin-top:8px;">
            <div class="player-role">
                Room: <strong id="roomCode" th:text="${roomId}">000000</strong>
            </div>
            <button type="button" id="copyRoomLink" style="background:#6c757d;">Copy Invite Link</button>
        </div>
        <div class="player-info">
            <div class="player-tag">
                <div id="whitePlayerLabel" th:text="${whitePlayer.name} + ' (White)'"></div>
                <div th:if="${whiteIsAI}" class="ai-badge">AI</div>
            </div>
            <div class="player-tag">
                <div id="blackPlayerLabel" th:text="${blackPlayer.name} + ' (Black)'"></div>
                <div th:if="${blackIsAI}" class="ai-badge">AI</div>
            </div>
        </div>
    </div>

    <div class="board-container">
        <div class="captured-section">
            <h4>Captured (White)</h4>
            <div>
                <span th:each="p : ${capturedWhite}" th:text="${p.displayChar}"></span>
            </div>
        </div>

        <div class="board" id="board">
            <!-- iterate server-provided viewRowIndices to render rows in the correct orientation -->
            <div th:each="rIndex : ${viewRowIndices}" class="row" th:data-row-index="${rIndex}">
                <div th:each="c : ${#numbers.sequence(0,7)}"
                     th:class="'cell ' + (${(rIndex + c) % 2 == 0} ? 'white' : 'black')"
                     th:data-position="${positions[rIndex][c]}"
                     th:data-row="${rIndex}"
                     th:data-col="${c}">
                    <span th:text="${board.getCell(rIndex, c).piece?.getDisplayChar()}"></span>
                </div>
            </div>
        </div>

        <div class="captured-section">
            <h4>Captured (Black)</h4>
            <div>
                <span th:each="p : ${capturedBlack}" th:text="${p.displayChar}"></span>
            </div>
        </div>
    </div>

    <div class="move-form">
        <div>
            <form action="/resign" method="post" style="display: inline;">
                <button type="submit" class="resign">Resign</button>
            </form>
            <form action="/exit" method="post" style="display: inline;">
                <button type="submit" style="background:#6c757d;">Exit Game</button>
            </form>
            <div class="player-role">
                <span id="playerRoleLabel" th:if="${viewAsWhite}" th:text="'You are playing: ' + (${whiteIsAI} ? 'AI (White)' : 'White')"></span>
                <span id="playerRoleLabel" th:unless="${viewAsWhite}" th:text="'You are playing: ' + (${blackIsAI} ? 'AI (Black)' : 'Black')"></span>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        const ROOM_ID = /*[[${roomId}]]*/ null;
        const PLAYER_NAME = /*[[${playerName}]]*/ null;
        let PLAYER_TOKEN = /*[[${playerToken}]]*/ null;
    </script>

    <script>
        let selectedCell = null;
        let validMoves = [];
        let currentRoomState = null;
        let lastRoomMoveNumber = 0;
        let moveAnimationInProgress = false;
        let roomRole = null;
        const isRoomGame = Boolean(ROOM_ID);

        // Piece sets for promotion dialog keyed by color
        const PROMOTION_PIECES = {
            white: [
                { piece: 'q', symbol: '♕', label: 'Queen'  },
                { piece: 'r', symbol: '♖', label: 'Rook'   },
                { piece: 'b', symbol: '♗', label: 'Bishop' },
                { piece: 'n', symbol: '♘', label: 'Knight' }
            ],
            black: [
                { piece: 'q', symbol: '♛', label: 'Queen'  },
                { piece: 'r', symbol: '♜', label: 'Rook'   },
                { piece: 'b', symbol: '♝', label: 'Bishop' },
                { piece: 'n', symbol: '♞', label: 'Knight' }
            ]
        };

        // Determine which color is currently moving from server-rendered text
        let currentColorIsWhite = document.querySelector('.game-info h2')
            ?.textContent?.includes('White') ?? true;

        function clearHighlights() {
            document.querySelectorAll('.cell').forEach(cell => {
                cell.classList.remove('valid-move', 'selected');
            });
            validMoves = [];
        }

        function highlightValidMoves(position) {
            const url = isRoomGame
                ? '/rooms/' + encodeURIComponent(ROOM_ID) + '/validMoves/' + encodeURIComponent(position)
                : '/validMoves/' + encodeURIComponent(position);
            fetch(url)
                .then(r => r.json())
                .then(moves => {
                    validMoves = moves;
                    moves.forEach(move => {
                        const cell = document.querySelector(`[data-position="${move}"]`);
                        if (cell) cell.classList.add('valid-move');
                    });
                });
        }

        function makeMove(from, to, promotion) {
            if (isRoomGame) {
                makeRoomMove(from, to, promotion);
                return;
            }

            const formData = new FormData();
            formData.append('from', from);
            formData.append('to', to);
            if (promotion) formData.append('promotion', promotion);

            fetch('/move', { method: 'POST', body: formData })
                .then(() => window.location.reload());
        }

        /** Returns true if the piece on `cell` is a pawn heading to a promotion rank. */
        function isPromotionMove(fromCell, toPosition) {
            const symbol = fromCell.querySelector('span')?.textContent?.trim();
            const isPawn = symbol === '♙' || symbol === '♟';
            if (!isPawn) return false;
            const toRank = parseInt(toPosition[1], 10);
            // white pawns promote on rank 8, black on rank 1
            return (currentColorIsWhite && toRank === 8) ||
                   (!currentColorIsWhite && toRank === 1);
        }

        /** Show promotion dialog then resolve with the chosen piece letter. */
        function askPromotion() {
            return new Promise(resolve => {
                const modal  = document.getElementById('promotionModal');
                const pieces = document.getElementById('promotionPieces');
                const set    = currentColorIsWhite ? PROMOTION_PIECES.white : PROMOTION_PIECES.black;

                pieces.innerHTML = '';
                set.forEach(({ piece, symbol, label }) => {
                    const btn = document.createElement('button');
                    btn.className = 'promotion-piece-btn';
                    btn.textContent = symbol;
                    btn.title = label;
                    btn.setAttribute('aria-label', label);
                    btn.addEventListener('click', () => {
                        modal.classList.remove('show');
                        modal.setAttribute('aria-hidden', 'true');
                        resolve(piece);
                    });
                    pieces.appendChild(btn);
                });

                modal.classList.add('show');
                modal.setAttribute('aria-hidden', 'false');
                // focus first button for keyboard accessibility
                pieces.querySelector('button')?.focus();
            });
        }

        function attachCellListeners() {
            document.querySelectorAll('.cell').forEach(cell => {
                cell.addEventListener('click', async () => {
                    const position = cell.dataset.position;

                    if (!selectedCell) {
                        // First click: select a piece.
                        // In a room game, only allow selecting your own pieces on your turn.
                        if (isRoomGame && !canCurrentRoomPlayerMove()) {
                            return;
                        }
                        if (cell.querySelector('span').textContent.trim()) {
                            selectedCell = cell;
                            cell.classList.add('selected');
                            highlightValidMoves(position);
                        }
                    } else {
                        // Second click: move the selected piece or deselect.
                        if (validMoves.includes(position)) {
                            // Only submit the move if it's still our turn (guard against race conditions)
                            if (!isRoomGame || canCurrentRoomPlayerMove()) {
                                let promotion = null;
                                if (isPromotionMove(selectedCell, position)) {
                                    promotion = await askPromotion();
                                }
                                makeMove(selectedCell.dataset.position, position, promotion);
                            }
                        }
                        clearHighlights();
                        selectedCell = null;
                    }
                });
            });
        }

        attachCellListeners();

        function canCurrentRoomPlayerMove() {
            // If state hasn't loaded yet but we have a role, allow interaction optimistically.
            // This prevents a blank period right after joining where nothing can be clicked.
            if (!currentRoomState) {
                // No state yet — be permissive only if we haven't received a state saying it's inactive
                return roomRole !== null;
            }
            if (currentRoomState.roomStatus !== 'ACTIVE') return false;
            if (!PLAYER_NAME) return false;
            // It's this player's turn when the server says so
            if (currentRoomState.currentPlayer !== PLAYER_NAME) return false;
            // Verify color matches role to prevent desyncs
            if (roomRole === 'white') return currentColorIsWhite;
            if (roomRole === 'black') return !currentColorIsWhite;
            // roomRole not yet assigned — allow move since server will validate anyway
            return true;
        }

        function makeRoomMove(from, to, promotion) {
            const formData = new FormData();
            formData.append('from', from);
            formData.append('to', to);
            formData.append('playerName', PLAYER_NAME);
            if (PLAYER_TOKEN) {
                formData.append('playerToken', PLAYER_TOKEN);
            }
            if (promotion) formData.append('promotion', promotion);

            fetch('/room/' + encodeURIComponent(ROOM_ID) + '/move', {
                method: 'POST',
                body: formData
            })
                .then(r => r.json())
                .then(resp => {
                    if (!resp.success && resp.message) {
                        setRoomMessage(resp.message);
                    }
                    return refreshRoomState();
                });
        }

        function joinCurrentRoom() {
            const formData = new FormData();
            formData.append('playerName', PLAYER_NAME || 'Player');

            return fetch('/room/' + encodeURIComponent(ROOM_ID) + '/join', {
                method: 'POST',
                body: formData
            })
                .then(r => r.json())
                .then(resp => {
                    if (!resp.success) {
                        setRoomMessage(resp.error || 'Could not join room');
                        return;
                    }
                    roomRole = resp.role;
                    if (resp.playerToken) {
                        PLAYER_TOKEN = resp.playerToken;
                    }
                    if (resp.state) applyRoomState(resp.state);
                });
        }

        function refreshRoomState() {
            return fetch('/room/' + encodeURIComponent(ROOM_ID) + '/state')
                .then(r => r.json())
                .then(applyRoomState)
                .catch(() => setRoomMessage('Connection lost. Retrying...'));
        }

        function animateRoomMove(from, to, done) {
            const board = document.getElementById('board');
            if (!board) {
                done();
                return;
            }
            const source = board.querySelector(`[data-position="${from}"]`);
            const target = board.querySelector(`[data-position="${to}"]`);
            if (!source || !target) {
                done();
                return;
            }
            const sourcePiece = source.querySelector('span');
            if (!sourcePiece || !sourcePiece.textContent.trim()) {
                done();
                return;
            }

            const boardRect = board.getBoundingClientRect();
            const sourceRect = source.getBoundingClientRect();
            const targetRect = target.getBoundingClientRect();

            const clone = document.createElement('span');
            clone.className = 'anim-piece';
            clone.textContent = sourcePiece.textContent.trim();
            clone.style.width = `${sourceRect.width}px`;
            clone.style.height = `${sourceRect.height}px`;
            clone.style.fontSize = window.getComputedStyle(sourcePiece).fontSize;
            clone.style.left = `${sourceRect.left - boardRect.left}px`;
            clone.style.top = `${sourceRect.top - boardRect.top}px`;
            clone.style.transform = 'translate(0, 0)';

            board.appendChild(clone);
            requestAnimationFrame(() => {
                const dx = targetRect.left - sourceRect.left;
                const dy = targetRect.top - sourceRect.top;
                clone.style.transform = `translate(${dx}px, ${dy}px)`;
            });

            const cleanup = () => {
                if (clone.parentElement) {
                    clone.parentElement.removeChild(clone);
                }
                done();
            };

            clone.addEventListener('transitionend', cleanup, { once: true });
            setTimeout(() => {
                if (clone.parentElement) {
                    cleanup();
                }
            }, 300);
        }

        function applyRoomState(state) {
            if (!state || !state.success) {
                setRoomMessage(state?.message || 'Waiting for room state...');
                return;
            }

            const shouldAnimate = currentRoomState && !moveAnimationInProgress &&
                state.lastMoveNumber > lastRoomMoveNumber &&
                state.playerMove && state.playerMove.from && state.playerMove.to;

            if (shouldAnimate) {
                moveAnimationInProgress = true;
                animateRoomMove(state.playerMove.from, state.playerMove.to, () => {
                    moveAnimationInProgress = false;
                    currentRoomState = state;
                    lastRoomMoveNumber = state.lastMoveNumber;
                    currentColorIsWhite = state.currentPlayer === state.whitePlayerName;
                    updateBoardFromState(state);
                    updateRoomLabels(state);
                });
                return;
            }

            currentRoomState = state;
            lastRoomMoveNumber = state.lastMoveNumber || 0;
            currentColorIsWhite = state.currentPlayer === state.whitePlayerName;

            updateBoardFromState(state);
            updateRoomLabels(state);
        }

        function updateBoardFromState(state) {
            if (!state.board) return;
            state.board.flat().forEach(cellState => {
                const cell = document.querySelector(`[data-position="${cellState.position}"]`);
                if (!cell) return;
                const piece = cell.querySelector('span');
                if (piece) piece.textContent = cellState.display || '';
            });
        }

        function updateRoomLabels(state) {
            const whiteName = state.whitePlayerName || 'White';
            const blackName = state.blackPlayerName || 'Waiting for opponent...';
            document.getElementById('whitePlayerLabel').textContent = whiteName + ' (White)';
            document.getElementById('blackPlayerLabel').textContent = blackName + ' (Black)';

            const colorText = state.currentPlayer === whiteName ? 'White' : 'Black';
            document.getElementById('turnTitle').textContent = 'Current Turn: ' + state.currentPlayer + ' (' + colorText + ')';

            if (state.roomStatus === 'ACTIVE' && state.playerCount === 2) {
                document.getElementById('statusText').textContent = state.currentPlayer + "'s turn to move";
            } else {
                document.getElementById('statusText').textContent = 'Waiting for opponent to join. Share the room link or room code.';
            }

            const roleText = roomRole
                ? 'You are playing: ' + (roomRole === 'white' ? 'White' : 'Black')
                : 'Joining room...';
            const canMoveText = canCurrentRoomPlayerMove() ? ' - your turn' : '';
            document.getElementById('playerRoleLabel').textContent = roleText + canMoveText;
        }

        function setRoomMessage(message) {
            const status = document.getElementById('statusText');
            if (status) status.textContent = message;
        }

        function setupRoomGame() {
            if (!PLAYER_NAME || !PLAYER_NAME.trim()) {
                const enteredName = window.prompt('Enter your name to join this room');
                if (!enteredName || !enteredName.trim()) {
                    setRoomMessage('Enter a player name to join this room.');
                    return;
                }
                window.location.href = '/room/' + encodeURIComponent(ROOM_ID) + '?name=' + encodeURIComponent(enteredName.trim());
                return;
            }

            const copyButton = document.getElementById('copyRoomLink');
            if (copyButton) {
                copyButton.addEventListener('click', () => {
                    const inviteUrl = window.location.origin + '/room/' + encodeURIComponent(ROOM_ID);
                    navigator.clipboard?.writeText(inviteUrl);
                    copyButton.textContent = 'Link Copied';
                    setTimeout(() => copyButton.textContent = 'Copy Invite Link', 1500);
                });
            }

            joinCurrentRoom().then(() => {
                refreshRoomState();
                setInterval(refreshRoomState, 1500);
            });
        }

        if (isRoomGame) {
            setupRoomGame();
        }
    </script>

    <!-- Celebration overlay: shown when someone wins -->
    <div th:if="${gameStatus.name().contains('WON') or gameStatus.name().contains('MATE')}" class="celebration-overlay" id="celebration">
        <div class="celebration-card">
            <div class="celebration-message" th:text="${gameStatus.name().contains('WON') ? (currentPlayer.name + ' wins!') : (currentPlayer.name + ' wins by mate!')}">Victory!</div>
            <div class="celebration-sub" th:text="'Winner: ' + ${currentPlayer.name}">Winner: Player</div>
            <div>
                <form action="/exit" method="post" style="display:inline;"><button type="submit">Back to Start</button></form>
            </div>
        </div>
    </div>

    <!-- Promotion modal: shown when a pawn reaches the back rank -->
    <div id="promotionModal" class="promotion-modal" aria-hidden="true">
        <div class="promotion-card" role="dialog" aria-modal="true" aria-labelledby="promotionTitle">
            <h3 id="promotionTitle">Promote your pawn</h3>
            <div class="promotion-pieces" id="promotionPieces">
                <!-- pieces injected by JS based on current player color -->
            </div>
        </div>
    </div>

    <!-- Confirmation modal (reused for exit/resign) -->
    <div id="confirmModal" class="confirm-modal" aria-hidden="true">
        <div class="confirm-card" role="dialog" aria-modal="true" aria-labelledby="confirmTitle">
            <h3 id="confirmTitle">Confirm action</h3>
            <p id="confirmMessage">Are you sure?</p>
            <div style="display:flex; gap:12px; justify-content:center; margin-top:12px;">
                <button id="confirmCancel" class="button button-secondary">Cancel</button>
                <button id="confirmOk" class="button button-primary">Yes, continue</button>
            </div>
        </div>
    </div>

    <script>
        // minimal confetti using canvas
        (function(){
            const overlay = document.getElementById('celebration');
            if (!overlay) return;

            // create canvas
            const canvas = document.createElement('canvas');
            canvas.style.position = 'fixed';
            canvas.style.left = 0;
            canvas.style.top = 0;
            canvas.style.pointerEvents = 'none';
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            canvas.id = 'confettiCanvas';
            overlay.appendChild(canvas);

            const ctx = canvas.getContext('2d');
            const pieces = [];
            const colors = ['#ffcd4a','#ff6b6b','#6bffb8','#6bb7ff','#c996ff'];

            for (let i=0;i<120;i++) {
                pieces.push({
                    x: Math.random()*canvas.width,
                    y: Math.random()*canvas.height - canvas.height,
                    vx: (Math.random()-0.5)*3,
                    vy: 2 + Math.random()*4,
                    size: 6 + Math.random()*10,
                    color: colors[Math.floor(Math.random()*colors.length)],
                    rot: Math.random()*360
                });
            }

            let t = 0;
            function draw() {
                ctx.clearRect(0,0,canvas.width,canvas.height);
                t++;
                for (const p of pieces) {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.rot += p.vx*3;
                    ctx.save();
                    ctx.translate(p.x,p.y);
                    ctx.rotate(p.rot*Math.PI/180);
                    ctx.fillStyle = p.color;
                    ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size*0.6);
                    ctx.restore();
                }
                requestAnimationFrame(draw);
            }

            draw();

            // stop confetti after 6s and remove canvas
            setTimeout(()=>{
                overlay.removeChild(canvas);
            }, 6000);
        })();
    </script>

            <script>
                // Confirmation modal logic
                const confirmModal = document.getElementById('confirmModal');
                const confirmMessage = document.getElementById('confirmMessage');
                const confirmOk = document.getElementById('confirmOk');
                const confirmCancel = document.getElementById('confirmCancel');
                let confirmResolve = null;

                function showConfirm(message) {
                    confirmMessage.textContent = message;
                    confirmModal.classList.add('show');
                    return new Promise((resolve) => { confirmResolve = resolve; });
                }

                function hideConfirm() {
                    confirmModal.classList.remove('show');
                    if (confirmResolve) { confirmResolve(false); confirmResolve = null; }
                }

                confirmCancel.addEventListener('click', () => { hideConfirm(); });
                confirmOk.addEventListener('click', () => { if (confirmResolve) { confirmResolve(true); confirmResolve = null; } confirmModal.classList.remove('show'); });

                // Intercept exit and resign forms
                document.querySelectorAll('form[action="/exit"], form[action="/resign"]').forEach(form => {
                    form.addEventListener('submit', async (e) => {
                        e.preventDefault();
                        const action = form.getAttribute('action');
                        const confirmText = action === '/resign' ? 'Are you sure you want to resign? This cannot be undone.' : 'Are you sure you want to exit to the start screen? Your current game will be lost.';
                        const ok = await showConfirm(confirmText);
                        if (ok) form.submit();
                    });
                });

                // Play a short celebration audio when overlay exists
                (function playCelebrationAudio() {
                    const overlay = document.getElementById('celebration');
                    if (!overlay) return;
                    try {
                        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                        const o = audioCtx.createOscillator();
                        const g = audioCtx.createGain();
                        o.type = 'sine';
                        o.frequency.setValueAtTime(880, audioCtx.currentTime);
                        g.gain.setValueAtTime(0, audioCtx.currentTime);
                        o.connect(g);
                        g.connect(audioCtx.destination);
                        o.start();
                        g.gain.linearRampToValueAtTime(0.1, audioCtx.currentTime + 0.02);
                        o.frequency.linearRampToValueAtTime(1320, audioCtx.currentTime + 0.2);
                        g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1.2);
                        setTimeout(()=>o.stop(), 1400);
                    } catch (e) {
                        // ignore audio failures (autoplay policy etc.)
                    }
                })();
            </script>
</body>
